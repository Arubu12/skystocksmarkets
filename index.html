<!DOCTYPE html>
<html>
<head>
  <title>Sky Stocks Market</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* LOGIN */
    .login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: #1f2937;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* DASHBOARD */
    .topbar {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login">
  <div class="box">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="topbar">
    Sky Stocks Market Dashboard 🚀
  </div>

  <div class="container">

    <div class="card">
      <div>Account Balance</div>
      <div class="big">$5,000</div>
    </div>

    <div class="card">
      <div>Profit Today</div>
      <div class="big">+$320</div>
    </div>

    <div class="card">
      <div>Trades</div>
      <div class="big">12</div>
    </div>

    <div class="card">
      <div>Bitcoin Price</div>
      <div class="big">$67,000</div>
    </div>

    <div class="card">
      <div>Trading</div>
      <button onclick="alert('Trading coming soon')">Open Trade</button>
    </div>

    <div class="card">
      <div>Status</div>
      <div>Market Active</div>
    </div>

  </div>

</div>

<script>
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user && pass) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").classList.remove("hidden");
  } else {
    alert("Please enter login details");
  }
}
</script>

</body>
</html>
